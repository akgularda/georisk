name: Web Publishing

on:
  push:
    paths:
      - "web/**"
      - "artifacts/website_publishing/site_snapshot/latest/**"
      - "docs/website_operations.md"
      - "src/website_publishing/**"
      - ".github/workflows/web-publishing.yml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: web-publishing-pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install web dependencies
        working-directory: web
        run: npm ci
      - name: Validate content
        working-directory: web
        run: npm run content:validate
      - name: Lint web
        working-directory: web
        run: npm run lint
      - name: Build web
        working-directory: web
        env:
          GITHUB_PAGES: "true"
          PAGES_BASE_PATH: ${{ vars.PAGES_BASE_PATH }}
        run: npm run build
      - name: Verify exported site artifact
        run: |
          test -f web/out/index.html
          test -f web/out/api/health.json
      - uses: actions/configure-pages@v5
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/out
      - id: deployment
        uses: actions/deploy-pages@v4
