name: Site Snapshot Verify

on:
  push:
    paths:
      - "scripts/**"
      - "src/**"
      - "web/**"
      - "configs/**"
      - "docs/website_operations.md"
      - ".github/workflows/site-snapshot-verify.yml"
      - ".github/workflows/daily-site-refresh.yml"
  pull_request:
    paths:
      - "scripts/**"
      - "src/**"
      - "web/**"
      - "configs/**"
      - "docs/website_operations.md"
      - ".github/workflows/site-snapshot-verify.yml"
      - ".github/workflows/daily-site-refresh.yml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
      - name: Verify website snapshot publication
        run: python -m pytest src/tests/common/test_backend_refresh.py src/tests/website_publishing -q
      - name: Write deterministic site snapshot inputs
        run: python scripts/write_site_snapshot_verify_inputs.py --config configs/website_publishing/site_snapshot.yaml
      - name: Publish website snapshot locally
        run: python -m src.website_publishing.cli --config configs/website_publishing/site_snapshot.yaml
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install web dependencies
        working-directory: web
        run: npm ci
      - name: Validate content
        working-directory: web
        run: npm run content:validate
      - name: Lint web
        working-directory: web
        run: npm run lint
      - name: Build web
        working-directory: web
        env:
          GITHUB_PAGES: "true"
          PAGES_BASE_PATH: ${{ vars.PAGES_BASE_PATH }}
        run: npm run build
      - name: Verify exported site artifact
        run: |
          test -f web/out/index.html
          test -f web/out/api/health.json
