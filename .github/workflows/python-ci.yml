name: python-ci

on:
  push:
    paths:
      - "src/**"
      - "configs/**"
      - "data/fixtures/**"
      - "pyproject.toml"
  pull_request:
    paths:
      - "src/**"
      - "configs/**"
      - "data/fixtures/**"
      - "pyproject.toml"

jobs:
  forecasting-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
      - name: Build fixture data
        run: python data/fixtures/generate_synthetic_country_day.py
      - name: Run forecasting tests
        run: python -m pytest src/tests/forecasting -q
